<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Millions of recipes, one search engine. Odin Recipes."
    />
    <meta
      name="keywords"
      content="recipes, food, coding, html, css, the odin project"
    />
    <meta name="author" content="Daniel Nelson" />
    <title>Odin Recipes | Millions of Recipes, One Search Engine</title>
    <script
      src="https://kit.fontawesome.com/7f4d3f6357.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="nav py-0 pi-2">
      <div class="container m-auto flex flex-jc--sb ai-c jc-sb">
        <!-- Nav Logo -->
        <a href="index.html" class="h h-nav flex ai-c gap-1"
          ><img
            src="images/odin-colored.png"
            alt="Odin Recipes"
            class="img img-nav"
          />
          Odin Recipes</a
        >
        <!-- Nav List -->
        <ul class="nav-links flex gap-3">
          <li>
            <!-- Nav Menu Btn -->
            <button class="p-main btn p-1 nav-btn">
              <i aria-label="Open Menu" class="fa-solid fa-burger"></i>
            </button>
          </li>
          <!-- Nav Links -->
          <li class="nav-link">
            <a
              href="https://www.linkedin.com/in/daniel-nelson-9151a6212/"
              target="_blank"
              class="p-main a-nav"
              >Daniel Nelson /
              <i aria-hidden="true" class="fa-brands fa-linkedin-in"></i
            ></a>
          </li>
          <li class="nav-link">
            <a
              href="https://github.com/youngmrnelson"
              target="_blank"
              class="p-main a-nav"
              >View The Code /
              <i aria-hidden="true" class="fa-brands fa-github"></i
            ></a>
          </li>
        </ul>
      </div>
    </nav>
    <!-- Main Section -->
    <main class="my-4 p-2">
      <header class="bg-hero ta-c border py-2">
        <h2 class="h h-main">Welcome Back</h2>
        <p class="p-subtitle">John Doe!</p>
      </header>
      <section class="recipes p-2">
        <header class="ta-c my-4">
          <div class="container m-auto">
            <p class="p p-subheader">Check Out...</p>
            <h2 class="h h-header bottom-line display-inline">Your Recipes:</h2>
          </div>
        </header>
        <div class="container m-auto grid grid-gc--auto">
          <button class="btn btn-main p-2 ps-c grid-col-full">
            Add Recipe +
          </button>
          <!-- Recipes of the Day: Content -->
          <div
            class="container m-auto flex flex-fd--c flex-fd--c-mobile jc-sb ai-c gap-3 my-4 p-2"
          >
            <!-- Recipe Card -->
            <figure class="recipe p-2">
              <img
                src="images/recipes/recipe-of-day-1.jpg"
                alt=""
                class="img recipe-img"
              />
              <article class="recipe-title-container">
                <p class="recipe-title py-0">Recipe</p>
                <p class="recipe-stat py-0">
                  <span class="recipe-stat-alt">113</span> Calories
                </p>
                <p class="recipe-stat py-0">
                  <span class="recipe-stat-alt">12</span> Ingredients
                </p>
                <a href="#" target="_blank" class="recipe-link py-0"
                  >Full Recipe</a
                >
              </article>
            </figure>
          </div>
        </div>
      </section>
    </main>
    <!-- Footer -->
    <footer class="footer ta-c p-3">
      <p class="p-footer">
        Created by
        <a
          href="https://www.linkedin.com/in/daniel-nelson-9151a6212/"
          target="_blank"
          class="a-main"
          >Daniel Nelson</a
        >
        &copy; 2023
      </p>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/recipe.js"></script>
  </body>
</html>
