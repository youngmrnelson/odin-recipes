<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Millions of recipes, one search engine. Odin Recipes."
    />
    <meta
      name="keywords"
      content="recipes, food, coding, html, css, the odin project"
    />
    <meta name="author" content="Daniel Nelson" />
    <title>Odin Recipes | Millions of Recipes, One Search Engine</title>
    <script
      src="https://kit.fontawesome.com/7f4d3f6357.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="nav py-0 pi-2">
      <div class="container m-auto flex flex-jc--sb ai-c jc-sb">
        <!-- Nav Logo -->
        <a href="index.html" class="h h-nav flex ai-c gap-1"
          ><img
            src="images/odin-colored.png"
            alt="Odin Recipes"
            class="img img-nav"
          />
          Odin Recipes</a
        >
        <!-- Nav List -->
        <ul class="nav-links flex gap-3">
          <li>
            <!-- Nav Menu Btn -->
            <button class="p-main btn p-1 nav-btn">
              <i aria-label="Open Menu" class="fa-solid fa-burger"></i>
            </button>
          </li>
          <!-- Nav Links -->
          <li class="nav-link">
            <a
              href="https://www.linkedin.com/in/daniel-nelson-9151a6212/"
              target="_blank"
              class="p-main a-nav"
              >Daniel Nelson /
              <i aria-hidden="true" class="fa-brands fa-linkedin-in"></i
            ></a>
          </li>
          <li class="nav-link">
            <a
              href="https://github.com/youngmrnelson"
              target="_blank"
              class="p-main a-nav"
              >View The Code /
              <i aria-hidden="true" class="fa-brands fa-github"></i
            ></a>
          </li>
        </ul>
      </div>
    </nav>
    <!-- Main Section -->
    <main class="my-3 p-2">
      <header class="bg-hero ta-c border py-2">
        <h2 class="h h-main">Welcome Back</h2>
        <p class="p-subtitle">John Doe!</p>
      </header>
      <section class="recipes p-2">
        <header class="ta-c my-4">
          <div class="container m-auto">
            <p class="p p-subheader">Check Out...</p>
            <h2 class="h h-header bottom-line display-inline">Your Recipes:</h2>
          </div>
        </header>
        <div class="container m-auto grid grid-gc--auto p-rel">
          <button class="btn btn-main p-2 ps-c grid-col-full add-recipes">
            Add Recipe +
          </button>
          <!-- Recipes: Container -->
          <div
            class="container m-auto flex flex-fd--c flex-fd--c-mobile jc-sb ai-c gap-3 my-4 p-2 p-rel recipes-container"
          ></div>
          <form action="#" class="ta-c p-3 bg-light hidden" id="recipe-form">
            <fieldset class="flex flex-fd--c gap-3">
              <legend class="mb-3 p-step-title bottom-line">
                Describe your recipe
              </legend>
              <label for="name" class="p-main"
                >Recipe Name:
                <input
                  type="text"
                  id="name"
                  name="name"
                  class="p-0"
                  placeholder="e.g. Salad..."
                  required
              /></label>
              <label for="calories" class="p-main"
                >Total Calories:
                <input
                  type="number"
                  id="calories"
                  name="calories"
                  class="p-0"
                  placeholder="e.g. 112 Calories..."
                  required
              /></label>
              <label for="ingredients" class="p-main"
                >Total Ingredients:
                <input
                  type="number"
                  id="ingredients"
                  name="ingredients"
                  class="p-0"
                  placeholder="e.g. 13 Ingredients..."
                  required
              /></label>
              <input
                type="button"
                value="Add Recipe"
                class="btn btn-main"
                id="submit"
              />
            </fieldset>
          </form>
        </div>
      </section>
    </main>
    <!-- Footer -->
    <footer class="footer ta-c p-3">
      <p class="p-footer">
        Created by
        <a
          href="https://www.linkedin.com/in/daniel-nelson-9151a6212/"
          target="_blank"
          class="a-main"
          >Daniel Nelson</a
        >
        &copy; 2023
      </p>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/recipe.js"></script>
  </body>
</html>
